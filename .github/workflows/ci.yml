name: CI

# Light-tier CI: runs on a bare Linux runner with NO GPU, NO audio hardware,
# and only the pure-Python deps installed. The ~14K-line voice-assistant
# monolith and the heavy GPU/audio modules can't import here, so:
#   * skill tests whose third-party dep is absent SKIP gracefully
#     (tests/_skill_harness.load_skill_isolated raises unittest.SkipTest),
#   * the full end-to-end pipeline is validated separately, locally, by
#     tools/staging_integration.py (NOT run here — it needs a real boot + key).
# What this gate proves on every push/PR: the tree compiles, the test code is
# lint-clean, the unit suite passes, the codebase auditor is clean, and unit
# coverage holds above the floor.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  light-tier:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install light dependencies
        # Pure-Python / fast-wheel deps only — deliberately NOT torch, opencv,
        # faster-whisper, sounddevice, chromadb, sentence-transformers, etc.
        # Skills that need those skip on this runner by design.
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            anthropic requests psutil paho-mqtt feedparser msal pystray \
            numpy pillow apscheduler sqlalchemy rank-bm25 \
            pyflakes coverage

      - name: Syntax sweep (compileall)
        run: python -m compileall -q core skills tools tests adapters hud

      - name: Lint test code (pyflakes)
        run: python -m pyflakes tests

      - name: PII / secret leak gate
        run: python tools/check_no_pii.py

      - name: Unit suite
        run: python tools/run_tests.py

      # NOTE: tools/audit_codebase.py is a LOCAL/full-deps gate, not a CI step.
      # Even with --no-integration its import-resolution checks flag every
      # declared-but-not-installed dep (torch, cv2, PyQt, sounddevice, …) on a
      # bare runner, so it only gives accurate results in the full environment.
      # Run `python tools/audit_codebase.py` locally before a PR (CONTRIBUTING.md).

      - name: Coverage (report + enforce floor)
        # Baseline ~54% of the unit-testable surface (core/ + skills/ + tools/),
        # climbing via the ongoing coverage push. The ~14K-line monolith and
        # heavy GPU/audio modules are out of the measured set (covered by the
        # local integration tier). Floor sits below the baseline so it guards
        # against regressions without flaking; ratchet it up as coverage grows.
        run: python tools/run_coverage.py --xml --fail-under 47

      - name: Upload coverage.xml
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
